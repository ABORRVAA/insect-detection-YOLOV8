<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Insect Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      padding: 40px;
      text-align: center;
      max-width: 600px;
      width: 90%;
    }
    h1 {
      font-size: 2rem;
      color: #222;
    }
    p {
      font-size: 1.1rem;
      color: #555;
    }
    input[type="file"] {
      margin: 20px auto;
      display: block;
    }
    button {
      padding: 12px 24px;
      background-color: #4CAF50;
      color: white;
      border: none;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    .result {
      margin-top: 30px;
      text-align: left;
    }
    .result img {
      width: 100%;
      border-radius: 10px;
      border: 3px solid #eee;
    }
    .result h2 {
      font-size: 1.4rem;
      margin: 10px 0;
    }
    .result p {
      font-size: 1rem;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪲 Smart Insect Detector</h1>
    <p>Helping farmers detect harmful insects in stored grains 🧪</p>

    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="image" accept="image/*" required>
      <button type="submit">🔍 Detect Insect</button>
    </form>

    {% if result_image %}
    <div class="result">
      <h2>🖼 Insect Detection Result</h2>
      <img src="{{ result_image }}" alt="Detection Result">
    </div>
    {% endif %}

    {% if message %}
    <div class="result">
      <h2>📋 Detection Message</h2>
      <p>{{ message }}</p>
    </div>
    {% endif %}
  </div>
</body>
</html>
